<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=1080, height=1080, initial-scale=1.0" name="viewport"/>
<title>InnoHVasion - Slide 2</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&amp;family=Prompt:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background-color: #1a1a2e;">
<div class="slide-container" style="position: relative; width: 1080px; height: 1080px; overflow: hidden; background-color: #1a1a2e;">
<!-- Darken Overlay / Vignette effect using shapes -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: -200px; top: -200px; width: 600px; height: 600px; background-color: #0a0a0f; border-radius: 50%; filter: blur(150px); opacity: 0.6; z-index: 1;"></div>
<div data-object="true" data-object-type="shape" style="position: absolute; left: 680px; top: 680px; width: 600px; height: 600px; background-color: #0a0a0f; border-radius: 50%; filter: blur(150px); opacity: 0.6; z-index: 1;"></div>
<!-- Subtle Green Glow behind title -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 240px; top: 100px; width: 600px; height: 400px; background-color: #2d1b4e; border-radius: 50%; filter: blur(120px); opacity: 0.4; z-index: 1;"></div>
<!-- Divider Line -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 140px; top: 480px; width: 800px; height: 4px; background-color: #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.8); border-radius: 2px; z-index: 5;"></div>
<!-- Background Icons (Subtle) -->
<div data-object="true" data-object-type="icon" style="position: absolute; left: 100px; top: 100px; width: 120px; height: 120px; z-index: 2; opacity: 0.03; color: #ffffff; font-size: 100px;">
<i class="fa-solid fa-table"></i>
</div>
<div data-object="true" data-object-type="icon" style="position: absolute; left: 860px; top: 150px; width: 120px; height: 120px; z-index: 2; opacity: 0.03; color: #ffffff; font-size: 100px;">
<i class="fa-regular fa-paper-plane"></i>
</div>
<div data-object="true" data-object-type="icon" style="position: absolute; left: 150px; top: 700px; width: 120px; height: 120px; z-index: 2; opacity: 0.03; color: #ffffff; font-size: 100px;">
<i class="fa-solid fa-file-invoice-dollar"></i>
</div>
<div data-object="true" data-object-type="icon" style="position: absolute; left: 830px; top: 650px; width: 120px; height: 120px; z-index: 2; opacity: 0.03; color: #ffffff; font-size: 100px;">
<i class="fa-solid fa-clock"></i>
</div>
<!-- Main Title -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 50px; top: 220px; width: 980px; height: 220px; z-index: 10;">
<p style="font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 96px; line-height: 1.0; color: #ffffff; text-align: center; margin: 0; letter-spacing: -3px;">
                RETRABALHO.<br/>TODO DIA.
            </p>
</div>
<!-- Subtitle -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 100px; top: 540px; width: 880px; height: 260px; z-index: 10;">
<p style="font-family: 'Prompt', sans-serif; font-weight: 500; font-size: 40px; line-height: 1.6; color: #00ff88; text-align: center; margin: 0;">
                Conferir planilha.<br/>
                Enviar mensagem.<br/>
                Cobrar parcela.<br/>
<span style="color: #ffffff; font-weight: 700; text-decoration: underline; text-decoration-color: #00ff88;">Repetir.</span>
</p>
</div>
<!-- Body Text -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 140px; top: 860px; width: 800px; height: 120px; z-index: 10;">
<p style="font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 24px; line-height: 1.5; color: rgba(255,255,255,0.6); text-align: center; margin: 0;">
                Quando a operação depende de execução humana,<br/>o erro e o atraso são inevitáveis.
            </p>
</div>
<!-- Bottom Branding -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 0px; top: 1060px; width: 1080px; height: 20px; background-color: #00ff88; box-shadow: 0 -4px 15px rgba(0, 255, 136, 0.3); z-index: 10;"></div>
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 40px; top: 1010px; width: 200px; height: 40px; z-index: 10;">
<p style="font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 16px; color: rgba(255,255,255,0.4); margin: 0;">
                INNOHVASION
            </p>
</div>
</div>
</body>
</html>
